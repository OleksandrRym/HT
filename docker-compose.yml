services:
  postgres:
    image: postgres:14
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    networks:
      - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ht-service:
    build:
      dockerfile: Dockerfile
    container_name: ht-service
    ports:
      - "8080:8080"
    networks:
      - app-network
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb
      SPRING_DATASOURCE_USERNAME: appuser
      SPRING_DATASOURCE_PASSWORD: apppass
    depends_on:
      - postgres

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: